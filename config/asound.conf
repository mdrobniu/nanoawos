pcm.dsnooped {
    type dsnoop
    ipc_key 2048               # Unique identifier for shared memory (change if needed)
    slave {
        pcm "hw:2,0"           # The actual hardware device for the microphone
        rate 44100             # Set the sample rate; match with the microphone's sample rate
    }
    bindings.0 0
}

pcm.!default {
    type plug
    slave.pcm "dsnooped"
}

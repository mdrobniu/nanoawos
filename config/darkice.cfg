[general]
duration = 0          # Duration in seconds, 0 means infinite
bufferSecs = 1        # Audio buffer size in seconds
reconnect = yes       # Automatically reconnect on connection loss

[input]
device = default       # ALSA device for the microphone (adjust as needed)
sampleRate = 44100    # Sample rate in Hz (must match ALSA dsnoop rate)
bitsPerSample = 16    # Audio bit depth
channel = 1           # Mono audio

[icecast2-0]
bitrateMode = cbr
format = opus
bitrate = 128
server = localhost    # Icecast server address
port = 8000           # Icecast server port
password = pi # Icecast source password
mountPoint = epmy # Mount point (stream name)
name = epmy
